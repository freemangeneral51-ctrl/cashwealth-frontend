version: "3.9"
services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: cashwealth
    volumes:
      - mongo-data:/data/db
  api:
    build: .
    restart: unless-stopped
    ports:
      - "4000:4000"
    env_file:
      - .env
    environment:
      MONGO_URI: mongodb://mongo:27017/cashwealth
    depends_on:
      - mongo
volumes:
  mongo-data:
